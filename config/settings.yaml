project_name: global-market-monitor

# Email alert configuration (for price watchlist notifications)
email:
  enabled: false
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: ""          # your Gmail address
  smtp_password: ""      # Gmail App Password (not your login password)
  recipient: ""          # where to send alerts (can be same as smtp_user)

data_dir: data
cache_dir: data/cache

market_data:
  history_days: 60
  cn_history_days: 60
  us_history_days: 60

alerts:
  volume_ratio_threshold: 3.0
  news_spike_threshold: 5
  northbound_flow_threshold: 100000000

refresh:
  universe: weekly
  market_data: daily
  financials: quarterly
  peers: weekly
  news: daily
  capital_flow: daily
  macro: daily

