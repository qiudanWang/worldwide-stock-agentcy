# Global Tech Market — Market Definitions
# Each market entry defines: source, ticker suffix, currency, timezone, indices, and data source details.
# Adding a new market = adding a YAML entry here + a watchlist file in config/

markets:
  CN:
    name: China A-shares
    source: akshare
    ticker_suffix: ""
    currency: CNY
    timezone: Asia/Shanghai
    indices:
      - symbol: "000001.SS"
        name: Shanghai Composite
      - symbol: "399001.SZ"
        name: Shenzhen Component
      - symbol: "399006.SZ"
        name: ChiNext
    universe_source: akshare_industry
    universe_config: cn_industries.yaml
    news_source: akshare
    capital_flow_source: akshare_northbound
    market_cap_source: akshare

  US:
    name: United States
    source: yfinance
    ticker_suffix: ""
    currency: USD
    timezone: America/New_York
    indices:
