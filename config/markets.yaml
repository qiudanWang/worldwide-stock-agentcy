        name: S&P 500
      - symbol: "^IXIC"
        name: NASDAQ
      - symbol: "^DJI"
        name: Dow Jones
      - symbol: "^SOX"
        name: Philadelphia Semiconductor
    universe_source: nasdaq_api
    universe_config: us_watchlist.yaml  # fallback if API unavailable
    news_source: yfinance
    capital_flow_source: null
    market_cap_source: yfinance

